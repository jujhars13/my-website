<script>
// Enhance native audio elements with a large, mobile-friendly custom player
document.querySelectorAll('audio[controls]').forEach((audio) => {
  audio.classList.add('custom-enhanced');
  audio.removeAttribute('controls');

  var player = document.createElement('div');
  player.className = 'audio-player';

  var btn = document.createElement('button');
  btn.className = 'play-btn';
  btn.setAttribute('aria-label', 'Play');
  btn.innerHTML = '&#9654;';

  var track = document.createElement('div');
  track.className = 'player-track';

  var bar = document.createElement('div');
  bar.className = 'progress-bar-container';
  var fill = document.createElement('div');
  fill.className = 'progress-bar-fill';
  bar.appendChild(fill);

  var time = document.createElement('div');
  time.className = 'player-time';
  time.textContent = '0:00 / 0:00';

  track.appendChild(bar);
  track.appendChild(time);
  player.appendChild(btn);
  player.appendChild(track);

  audio.parentNode.insertBefore(player, audio.nextSibling);

  function fmt(s) {
    var m = Math.floor(s / 60);
    var sec = Math.floor(s % 60);
    return m + ':' + (sec < 10 ? '0' : '') + sec;
  }

  btn.addEventListener('click', () => {
    if (audio.paused) {
      audio.play();
    } else {
      audio.pause();
    }
  });

  audio.addEventListener('play', () => {
    btn.innerHTML = '&#9646;&#9646;';
    btn.setAttribute('aria-label', 'Pause');
  });

  audio.addEventListener('pause', () => {
    btn.innerHTML = '&#9654;';
    btn.setAttribute('aria-label', 'Play');
  });

  audio.addEventListener('timeupdate', () => {
    var dur = audio.duration || 0;
    var pct = dur ? (audio.currentTime / dur) * 100 : 0;
    fill.style.width = pct + '%';
    time.textContent = fmt(audio.currentTime) + ' / ' + fmt(dur);
  });

  audio.addEventListener('ended', () => {
    fill.style.width = '0%';
  });

  bar.addEventListener('click', (e) => {
    if (audio.duration) {
      var rect = bar.getBoundingClientRect();
      audio.currentTime = ((e.clientX - rect.left) / rect.width) * audio.duration;
    }
  });
});
</script>
